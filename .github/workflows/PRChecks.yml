name: 'PR Checks'
on:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    permissions:
      # Required to checkout the code
      contents: read
      # Required to put a comment into the pull-request
      pull-requests: write

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: griddening
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/griddening?schema=public

    steps:
    - uses: actions/checkout@v4
    - name: 'Install Node'
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: 'Install Deps'
      run: npm install
    - name: 'Lint'
      run: npm run lint
    - name: 'Format Check'
      run: npm run format:check
    - name: 'Test'
      run: npx vitest --coverage.enabled true
    - name: 'Report Coverage'
      # Set if: always() to also generate the report if tests are failing
      # Only works if you set `reportOnFailure: true` in your vite config as specified above
      if: always()
      uses:  davelosert/vitest-coverage-report-action@v2
    - name: 'Setup Database'
      run: npx prisma db push
    - name: 'Integration Test - Generate Puzzles'
      run: node --loader ts-node/esm main.ts
      env:
        RUN_ONCE: true
        MINIMUM_HITS: 1
      timeout-minutes: 5
    - name: 'Verify Puzzles Created'
      run: |
        COUNT=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM \"Game\";" | tr -d ' ')
        echo "Games created: $COUNT"
        if [ "$COUNT" -lt 1 ]; then
          echo "No games were created!"
          exit 1
        fi
