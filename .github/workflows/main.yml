#
name: Create and publish a Docker image

# Configures this workflow to run every time a change is pushed to the branch called `release`.
on:
  push:
    branches: ['main']

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: griddening
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/griddening?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: 'Install Node'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: 'Install Deps'
        run: npm install
      - name: 'Lint'
        run: npm run lint
      - name: 'Format Check'
        run: npm run format:check
      - name: 'Test'
        run: npx vitest run
      - name: 'Setup Database'
        run: npx prisma db push
      - name: 'Lowercase Image Name'
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV
      - name: 'Build Docker Image'
        id: build
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
          load: true
      - name: 'Docker Integration Test'
        run: |
          docker run --rm \
            --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e RUN_ONCE=true \
            -e MINIMUM_HITS=1 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
        timeout-minutes: 5
      - name: 'Verify Puzzles Created'
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM \"Game\";" | tr -d ' ')
          echo "Games created by Docker container: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "No games were created!"
            exit 1
          fi
      - name: 'Reset Database Before Scheduler Test'
        run: psql "${DATABASE_URL%%\?*}" -c "DELETE FROM \"Game\";"
      - name: 'Docker Scheduler Test'
        run: |
          docker run -d --name scheduler-test \
            --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e MINIMUM_HITS=1 \
            -e CRON_SCHEDULE="*/15 * * * * *" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
          sleep 50
          docker logs scheduler-test
          FIRINGS=$(docker logs scheduler-test 2>&1 | grep -c "firing job" || true)
          docker stop scheduler-test >/dev/null
          docker rm scheduler-test >/dev/null
          echo "Scheduler fired $FIRINGS time(s)"
          if [ "$FIRINGS" -lt 2 ]; then
            echo "Expected scheduler to fire at least 2 times"
            exit 1
          fi
        timeout-minutes: 3
      # Push only after integration test passes
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Push Docker image
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }} ${{ steps.meta.outputs.tags }}
          docker push ${{ steps.meta.outputs.tags }}
